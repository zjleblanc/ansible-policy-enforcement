# Tiny payload: only fields some policies read (Rego still receives full input; policy uses extra_vars).
minimal_job_stub:
  id: 2001
  name: "Minimal job shape (id, name, extra_vars only)"
  extra_vars: {}
opa_demo_case_inputs:
  - case: staging_allowed_full_platform_shape
    description: "Staging target, full AAP-style job document — should allow (no CHG required)."
    job_id: 1001
    job_name: "DB maintenance — staging"
    expect_allowed: true
    extra_vars:
      demo_target_environment: staging
      operation: apply_migration
      database_name: orders
  - case: production_denied_missing_demo_change_ticket
    description: "Production without demo_change_ticket — should deny."
    job_id: 1002
    job_name: "DB maintenance — production"
    expect_allowed: false
    extra_vars:
      demo_target_environment: production
      operation: apply_migration
      database_name: orders
  - case: production_allowed_with_chg_ticket
    description: "Production with CHG ticket — should allow."
    job_id: 1003
    job_name: "DB maintenance — production (approved)"
    expect_allowed: true
    extra_vars:
      demo_target_environment: production
      demo_change_ticket: "CHG-4412"
      operation: apply_migration
      database_name: orders
  - case: production_denied_bad_ticket_format
    description: "Production with INC-style ticket — should deny (invalid format)."
    job_id: 1004
    job_name: "DB maintenance — production (wrong ticket type)"
    expect_allowed: false
    extra_vars:
      demo_target_environment: prod
      demo_change_ticket: "INC-123"
      operation: apply_migration
  - case: minimal_payload_staging_only_core_fields
    description: "Minimal payload (id, name, extra_vars) — staging should still allow."
    job_id: 2002
    job_name: "Minimal staging launch"
    expect_allowed: true
    payload_mode: minimal
    extra_vars:
      demo_target_environment: staging
      operation: apply_migration
  - case: production_denied_prod_alias_no_ticket
    description: "demo_target_environment prod (alias) without ticket — should deny."
    job_id: 1005
    job_name: "DB maintenance — prod alias"
    expect_allowed: false
    extra_vars:
      demo_target_environment: prod
      operation: vacuum_analyze